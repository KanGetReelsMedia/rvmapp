<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline | RV Metro</title>
    <script src="[https://cdn.tailwindcss.com](https://cdn.tailwindcss.com)"></script>
    <style>body { background: #0f172a; color: white; font-family: sans-serif; }</style>
</head>
<body class="flex items-center justify-center h-screen text-center p-6">
    <div class="bg-white/5 backdrop-blur-xl p-8 rounded-[2.5rem] border border-white/10 w-full max-w-sm">
        <div class="text-blue-500 text-5xl mb-4">📡</div>
        <h1 class="text-2xl font-black mb-2">You're Offline</h1>
        <p class="text-white/60 text-sm mb-6">Check your connection to view live bus tracking.</p>
        <button onclick="window.location.reload()" class="bg-white text-black font-bold py-3 px-8 rounded-full w-full">Try Again</button>
    </div>
</body>
</html>
