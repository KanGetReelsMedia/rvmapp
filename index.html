<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>River Valley Metro | Home & Rewards</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #000; color: white; overflow: hidden; height: 100vh; width: 100vw; }

    #canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }

    .app-container { 
      position: absolute; top: 0; left: 0; width: 100%; height: 100dvh; 
      z-index: 10; overflow-y: scroll; scroll-snap-type: y mandatory; -webkit-overflow-scrolling: touch; 
      scroll-behavior: smooth;
    }
    .app-container::-webkit-scrollbar { display: none; }

    .content-section { min-height: 100dvh; width: 100%; padding: 20px; display: flex; flex-direction: column; scroll-snap-align: start; flex-shrink: 0; }
    
    #splash { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10000; transition: opacity 0.8s ease; }
    .loader-progress { width: 40%; height: 100%; background: #3b82f6; animation: loading 1.5s infinite ease-in-out; }
    @keyframes loading { 0% { transform: translateX(-100%); } 100% { transform: translateX(250%); } }

    .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 2rem; }
    
    .pass-card { background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 3.5rem; width: 100%; max-width: 400px; padding: 40px 24px; text-align: center; margin: auto; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }

    .bus-logo { width: 120px; height: 120px; margin: 0 auto 20px; border-radius: 50%; background: white; padding: 15px; display: flex; align-items: center; justify-content: center; }

    .glow-text { background: linear-gradient(135deg, #fff 0%, #94a3b8 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    .pulse-active { animation: active-glow 2s infinite ease-in-out; }
    .pulse-inactive { animation: inactive-glow 1.5s infinite ease-in-out; }
    @keyframes active-glow { 0%, 100% { transform: scale(1); box-shadow: 0 0 20px rgba(59, 130, 246, 0.4); border: 2px solid rgba(59, 130, 246, 0.5); } 50% { transform: scale(1.06); box-shadow: 0 0 50px rgba(59, 130, 246, 0.8); border: 2px solid rgba(59, 130, 246, 1); } }
    @keyframes inactive-glow { 0%, 100% { transform: scale(1); box-shadow: 0 0 15px rgba(239, 68, 68, 0.3); border: 2px solid rgba(239, 68, 68, 0.3); } 50% { transform: scale(1.03); box-shadow: 0 0 35px rgba(239, 68, 68, 0.6); border: 2px solid rgba(239, 68, 68, 0.8); } }

    .security-bar { height: 4px; width: 55%; margin: 15px auto; border-radius: 10px; transition: all 0.5s ease; }
    nav { z-index: 9000 !important; }
  </style>
</head>
<body>

  <canvas id="canvas"></canvas>

  <div id="splash">
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQjBRXORehZGVAUiu8vzUjk_Jli1YGIERGWwA&s" alt="Logo" class="w-24 h-24 rounded-full border-4 border-white/10">
    <h1 class="text-white text-xl font-black mt-4 uppercase tracking-tighter">River Valley Metro</h1>
    <div class="mt-6 w-24 h-1 bg-white/10 rounded-full overflow-hidden">
      <div class="loader-progress"></div>
    </div>
  </div>

  <div class="app-container" id="scrollLayer">
    <div id="mainContent" class="opacity-0 transition-opacity duration-1000">
      
      <section id="home" class="content-section pt-10">
        <header class="text-center mb-10">
          <div class="w-12 h-1.5 bg-white/20 rounded-full mx-auto mb-6"></div>
          <h1 class="text-3xl font-black glow-text tracking-tight">River Valley Metro</h1>
          <p class="text-blue-400 font-bold text-xs uppercase tracking-[0.3em]">Official Transit Portal</p>
        </header>

        <div class="space-y-6 px-4 flex-1">
          <div class="glass-card p-6">
            <h2 class="font-extrabold text-white mb-4 flex items-center justify-between">
              Metro Plus Status
              <span class="text-[10px] bg-blue-500/20 px-2 py-1 rounded-md text-blue-400 font-bold uppercase">Live</span>
            </h2>
            <div class="space-y-3 text-sm">
              <div class="flex justify-between border-b border-white/5 pb-2"><span class="text-white/40">Mon–Fri</span><span class="font-bold">5:00A - 9:30P</span></div>
              <div class="flex justify-between border-b border-white/5 pb-2"><span class="text-white/40">Saturday</span><span class="font-bold">7:00A - 9:30P</span></div>
              <div class="flex justify-between text-blue-400 font-bold"><span>Sun / Holiday</span><span>8:00A - 4:00P</span></div>
            </div>
          </div>
          
          <div class="text-center py-10 animate-bounce" onclick="document.getElementById('reward').scrollIntoView()">
            <p class="text-[10px] font-black uppercase tracking-[0.4em] opacity-40">Scroll Down for Rewards</p>
            <svg class="w-5 h-5 mx-auto mt-2 opacity-30" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 14l-7 7-7-7" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"></path></svg>
          </div>
        </div>
      </section>

      <section id="reward" class="content-section justify-center pb-40">
        <div class="pass-card">
          <p class="text-[10px] font-black text-blue-400 uppercase tracking-[0.3em] mb-4">App User Reward</p>
          <div class="bus-logo" id="logoFrame">
            <img src="https://storage.googleapis.com/token-transit.appspot.com/m-D9SrnA2icgetpHoaoGGkYOoocD6_1Tb5mhqFDprLU--logo.rivervalleymetro.png" alt="Metro">
          </div>
          <div id="currentDate" class="text-[11px] font-bold opacity-40 uppercase tracking-widest">-- -- --</div>
          <div id="currentTime" class="text-4xl font-black mt-1 tracking-tighter">00:00:00 --</div>
          <div id="securityBar" class="security-bar"></div>
          <h2 class="text-2xl font-black italic tracking-tighter uppercase leading-none">Thank You Ride</h2>
          <div class="mt-6 pt-6 border-t border-white/5">
            <div id="statusPill" class="inline-block px-10 py-3 rounded-full border transition-all duration-500">
              <span id="statusText" class="text-[11px] font-black uppercase tracking-widest">Checking...</span>
            </div>
          </div>
        </div>
      </section>

    </div>
  </div>

  <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[94%] max-w-[440px] bg-black/60 backdrop-blur-3xl border border-white/10 h-20 rounded-[2.5rem] flex items-center justify-around px-4 shadow-2xl z-[9999]">
    <a href="#home" class="flex flex-col items-center gap-1.5 text-white/30 flex-1">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>
        <span class="text-[8px] font-black uppercase">Home</span>
    </a>
    <a href="#reward" class="flex flex-col items-center gap-1.5 text-blue-400 flex-1">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 012-2h10a2 2 0 012 2v14a2 2 0 01-2 2H7a2 2 0 01-2-2V5z" /></svg>
        <span class="text-[8px] font-black uppercase">Reward</span>
    </a>
  </nav>

  <script id="vertexShader" type="x-shader/x-vertex">
    attribute vec2 position;
    void main() { gl_Position = vec4(position, 0.0, 1.0); }
  </script>
  <script id="fragmentShader" type="x-shader/x-fragment">
    precision highp float;
    uniform float uTime;
    uniform vec2 uResolution;
    void main() {
        vec2 uv = (gl_FragCoord.xy - 0.5 * uResolution) / min(uResolution.x, uResolution.y);
        float time = uTime * 0.1;
        vec3 col = vec3(0.0);
        for(float i = 1.0; i < 4.0; i++) {
            uv.x += 0.3 / i * sin(i * 3.0 * uv.y + time);
            uv.y += 0.3 / i * cos(i * 3.0 * uv.x + time);
            col += 0.003 / abs(sin(time + uv.y + uv.x));
        }
        col *= vec3(0.05, 0.12, 0.35);
        gl_FragColor = vec4(col, 1.0);
    }
  </script>

  <script>
    // Updated to today's date so it is ACTIVE
    const PASS_ACTIVATION_DATE = '2026-04-27'; 

    function updateRewards() {
      const now = new Date();
      document.getElementById('currentDate').textContent = now.toLocaleDateString(undefined, { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
      
      let hrs = now.getHours();
      const mins = String(now.getMinutes()).padStart(2, '0');
      const secs = String(now.getSeconds()).padStart(2, '0');
      const ampm = hrs >= 12 ? 'PM' : 'AM';
      hrs = hrs % 12 || 12;
      document.getElementById('currentTime').textContent = `${hrs}:${mins}:${secs} ${ampm}`;

      const todayIso = now.toLocaleDateString('en-CA'); // Gets YYYY-MM-DD
      const isActive = (todayIso === PASS_ACTIVATION_DATE);
      
      const pill = document.getElementById('statusPill');
      const statusTxt = document.getElementById('statusText');
      const bar = document.getElementById('securityBar');
      const logo = document.getElementById('logoFrame');

      if (isActive) {
        pill.className = "inline-block px-10 py-3 rounded-full border bg-blue-600/20 border-blue-500/40";
        statusTxt.className = "text-blue-400 text-[11px] font-black uppercase";
        statusTxt.textContent = "Active Reward";
        bar.style.background = "linear-gradient(90deg, transparent, #3b82f6, transparent)";
        logo.className = "bus-logo pulse-active";
      } else {
        pill.className = "inline-block px-10 py-3 rounded-full border bg-red-600/10 border-red-500/20";
        statusTxt.className = "text-red-600 text-[11px] font-black uppercase";
        statusTxt.textContent = "Not Active";
        bar.style.background = "linear-gradient(90deg, transparent, #ef4444, transparent)";
        logo.className = "bus-logo pulse-inactive";
      }
    }

    // WebGL Initialization
    const canvas = document.getElementById('canvas');
    const gl = canvas.getContext('webgl');
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; gl.viewport(0, 0, canvas.width, canvas.height); }
    window.addEventListener('resize', resize); resize();
    const program = gl.createProgram();
    const vs = gl.createShader(gl.VERTEX_SHADER);
    gl.shaderSource(vs, document.getElementById('vertexShader').textContent); gl.compileShader(vs);
    const fs = gl.createShader(gl.FRAGMENT_SHADER);
    gl.shaderSource(fs, document.getElementById('fragmentShader').textContent); gl.compileShader(fs);
    gl.attachShader(program, vs); gl.attachShader(program, fs); gl.linkProgram(program);
    const posLoc = gl.getAttribLocation(program, 'position');
    const uTime = gl.getUniformLocation(program, 'uTime');
    const uRes = gl.getUniformLocation(program, 'uResolution');
    const buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
    function render(t) {
      gl.useProgram(program); gl.uniform1f(uTime, t * 0.001); gl.uniform2f(uRes, canvas.width, canvas.height);
      gl.enableVertexAttribArray(posLoc); gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);
      gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4); requestAnimationFrame(render);
    }
    requestAnimationFrame(render);

    document.addEventListener('DOMContentLoaded', () => {
      setInterval(updateRewards, 1000);
      updateRewards();
      setTimeout(() => {
        document.getElementById('splash').style.opacity = '0';
        setTimeout(() => {
          document.getElementById('splash').style.display = 'none';
          document.getElementById('mainContent').classList.remove('opacity-0');
        }, 800);
      }, 1500);
    });
  </script>
</body>
</html>
