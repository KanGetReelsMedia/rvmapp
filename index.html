    <script id="fs" type="x-shader/x-fragment">
        precision highp float; uniform float uTime; uniform vec2 uRes;
        void main(){
            vec2 uv = (gl_FragCoord.xy-0.5*uRes)/min(uRes.x,uRes.y);
            float t=uTime*0.2; vec3 c=vec3(0.);
            for(float i=1.;i<4.;i++){ uv.x+=.3/i*sin(i*3.*uv.y+t); uv.y+=.3/i*cos(i*3.*uv.x+t); c+=.005/abs(sin(t+uv.y+uv.x)); }
            gl_FragColor=vec4(c*vec3(.1,.4,.9),1.);
        }
    </script>
    <script>

        function r(){c.width=window.innerWidth;c.height=window.innerHeight;gl.viewport(0,0,c.width,c.height);}
        window.onresize=r;r();
        const p=gl.createProgram();
        const s=(t,src)=>{const s=gl.createShader(t);gl.shaderSource(s,src);gl.compileShader(s);gl.attachShader(p,s);};
        s(gl.VERTEX_SHADER,document.getElementById('vs').textContent);
        s(gl.FRAGMENT_SHADER,document.getElementById('fs').textContent);
        gl.linkProgram(p);gl.useProgram(p);
        const buf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,buf);

        const pos=gl.getAttribLocation(p,'position');gl.enableVertexAttribArray(pos);
        gl.vertexAttribPointer(pos,2,gl.FLOAT,false,0,0);
