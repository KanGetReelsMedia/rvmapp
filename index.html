    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {

    <style type="text/css">

        /* Premium Glass Effect */
        .glass-panel {

            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);

        /* Ambient Glow for Service Alerts */

            border-left: 4px solid #3b82f6;
        }

<body class="text-slate-50 antialiased overflow-hidden h-[100dvh] flex flex-col items-center justify-center">

        <!-- Stats/Hours Section -->
        <section class="glass-panel rounded-3xl p-6 mb-12">

            &copy; 2026 River Valley Metro Transit
        </footer>
    </main>

    <!-- Shader Scripts -->
    <script id="vs" type="x-shader/x-vertex">attribute vec2 position; void main(){gl_Position=vec4(position,0.,1.);}</script>
    <script id="fs" type="x-shader/x-fragment">
        precision highp float; uniform float uTime; uniform vec2 uRes;
        void main(){
            vec2 uv = (gl_FragCoord.xy-0.5*uRes)/min(uRes.x,uRes.y);
            float t=uTime*0.1; vec3 c=vec3(0.);
            for(float i=1.;i<4.;i++){ 
                uv.x+=.4/i*sin(i*3.*uv.y+t); 
                uv.y+=.4/i*cos(i*3.*uv.x+t); 
                c+=.004/abs(sin(t+uv.y+uv.x)); 
            }
            gl_FragColor=vec4(c*vec3(.05,.2,.6),1.);
        }
    </script>
    
    <script>
        const canvas = document.getElementById('canvas'), gl = canvas.getContext('webgl');
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            gl.viewport(0, 0, canvas.width, canvas.height);
        }
        window.addEventListener('resize', resize);
        resize();

        const program = gl.createProgram();
        const addShader = (type, src) => {
            const s = gl.createShader(type);
            gl.shaderSource(s, src);
            gl.compileShader(s);
            gl.attachShader(program, s);
        };
        addShader(gl.VERTEX_SHADER, document.getElementById('vs').textContent);
        addShader(gl.FRAGMENT_SHADER, document.getElementById('fs').textContent);
        gl.linkProgram(program);
        gl.useProgram(program);

        const buffer = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
        gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
        const pos = gl.getAttribLocation(program, 'position');
        gl.enableVertexAttribArray(pos);
        gl.vertexAttribPointer(pos, 2, gl.FLOAT, false, 0, 0);

        function render(t) {
            gl.uniform1f(gl.getUniformLocation(program, 'uTime'), t * 0.001);
            gl.uniform2f(gl.getUniformLocation(program, 'uRes'), canvas.width, canvas.height);
            gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
            requestAnimationFrame(render);
        }
        render(0);

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(console.error);
            });
        }
    </script>
