<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <title>River Valley Metro | Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: white; font-family: sans-serif; overflow: hidden; height: 100dvh; display: flex; justify-content: center; align-items: center; }
        #canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
        
        .app-scroll-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 400px;
            height: 90dvh;
            overflow-y: auto;
            padding: 20px;
            scrollbar-width: none;
        }
        .app-scroll-container::-webkit-scrollbar { display: none; }

        .glass { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border-radius: 2.5rem; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
        }

        .alert-glow {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.2) 0%, rgba(0, 0, 0, 0.3) 100%);
            border: 1px solid rgba(59, 130, 246, 0.4);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="app-scroll-container">
        <div class="glass p-8 text-center mb-6">
            <img src="https://storage.googleapis.com/token-transit.appspot.com/m-D9SrnA2icgetpHoaoGGkYOoocD6_1Tb5mhqFDprLU--logo.rivervalleymetro.png" class="w-20 h-20 mx-auto rounded-full mb-4 shadow-2xl">
            <h1 class="text-2xl font-black tracking-tighter uppercase">RVM PREMIUM</h1>
            <p class="text-[10px] text-blue-400 font-bold tracking-[0.3em] uppercase">Transit Portal Active</p>
            
            <div class="mt-8 text-left alert-glow p-5 rounded-3xl">
                <div class="flex items-center gap-2 mb-2">
                    <span class="relative flex h-2 w-2">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-blue-500"></span>
                    </span>
                    <h2 class="text-[11px] font-black uppercase tracking-widest text-blue-400">Service Alert</h2>
                </div>
                <p class="text-lg font-bold leading-tight">ONU STOP CLOSED</p>
                <p class="text-xs font-medium text-white/70 mt-1">May 8th & May 9th</p>
                <p class="text-[10px] text-white/40 mt-3 leading-relaxed">
                    Route 11 will bypass Olivet Nazarene University. Please use alternative stops at nearby traffic lights.
                </p>
            </div>

            <div class="mt-8 space-y-3">
                 <a href="map.html" class="block bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-black transition-all active:scale-95 shadow-lg shadow-blue-900/20">LIVE BUS MAP</a>
                 <a href="tel:8159374287" class="block bg-white/5 hover:bg-white/10 py-4 rounded-2xl font-bold transition-all border border-white/10">CONTACT SUPPORT</a>
            </div>
        </div>

        <div class="glass p-6 mb-20">
            <h3 class="text-xs font-black text-white/40 uppercase tracking-widest mb-4 text-center">Service Hours</h3>
            <div class="space-y-3 text-sm font-medium">
                <div class="flex justify-between border-b border-white/5 pb-2">
                    <span class="text-white/50">Mon–Fri</span>
                    <span>5:00A - 9:30P</span>
                </div>
                <div class="flex justify-between">
                    <span class="text-white/50">Sat</span>
                    <span>7:00A - 9:30P</span>
                </div>
            </div>
        </div>
    </div>

    <script id="vs" type="x-shader/x-vertex">attribute vec2 position; void main(){gl_Position=vec4(position,0.,1.);}</script>
    <script id="fs" type="x-shader/x-fragment">
        precision highp float; uniform float uTime; uniform vec2 uRes;
        void main(){
            vec2 uv = (gl_FragCoord.xy-0.5*uRes)/min(uRes.x,uRes.y);
            float t=uTime*0.15; vec3 c=vec3(0.);
            for(float i=1.;i<4.;i++){ 
                uv.x+=.3/i*sin(i*3.*uv.y+t); 
                uv.y+=.3/i*cos(i*3.*uv.x+t); 
                c+=.005/abs(sin(t+uv.y+uv.x)); 
            }
            gl_FragColor=vec4(c*vec3(.1,.3,.8),1.);
        }
    </script>
    
    <script>
        // WebGL Setup
        const c=document.getElementById('canvas'),gl=c.getContext('webgl');
        function r(){c.width=window.innerWidth;c.height=window.innerHeight;gl.viewport(0,0,c.width,c.height);}
        window.onresize=r;r();
        const p=gl.createProgram();
        const s=(t,src)=>{const s=gl.createShader(t);gl.shaderSource(s,src);gl.compileShader(s);gl.attachShader(p,s);};
        s(gl.VERTEX_SHADER,document.getElementById('vs').textContent);
        s(gl.FRAGMENT_SHADER,document.getElementById('fs').textContent);
        gl.linkProgram(p);gl.useProgram(p);
        const buf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,buf);
        gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
        const pos=gl.getAttribLocation(p,'position');gl.enableVertexAttribArray(pos);
        gl.vertexAttribPointer(pos,2,gl.FLOAT,false,0,0);
        function loop(t){
            gl.uniform1f(gl.getUniformLocation(p,'uTime'),t*0.001);
            gl.uniform2f(gl.getUniformLocation(p,'uRes'),c.width,c.height);
            gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
            requestAnimationFrame(loop);
        }
        loop(0);

        // Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('PWA Registered', reg.scope))
                .catch(err => console.log('PWA Error', err));
            });
        }
    </script>
</body>
</html>
