<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>River Valley Metro | Premium</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #000; overflow: hidden; height: 100vh; color: white; display: flex; justify-content: center; align-items: center; }

    /* WebGL Background Layer */
    #canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }

    /* App Container */
    .app-container { 
      position: relative; 
      width: 100vw; 
      height: 100vh; 
      max-width: 430px; 
      max-height: 932px;
      z-index: 10; 
      overflow-y: auto; 
      scrollbar-width: none;
      background: rgba(0, 0, 0, 0.2);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .app-container::-webkit-scrollbar { display: none; }

    /* Splash Screen */
    #splash { 
      position: fixed; inset: 0; background: #000; 
      display: flex; flex-direction: column; justify-content: center; align-items: center; 
      z-index: 10000; transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1); 
    }
    
    .loader-progress { width: 40%; height: 100%; background: #3b82f6; animation: loading 1.5s infinite ease-in-out; }
    @keyframes loading { 0% { transform: translateX(-100%); } 100% { transform: translateX(250%); } }

    /* Glass Components */
    .glass-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 2.5rem;
    }

    .glow-text {
      background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
  </style>
</head>
<body>

  <canvas id="canvas"></canvas>

  <div id="splash">
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQjBRXORehZGVAUiu8vzUjk_Jli1YGIERGWwA&s" alt="Logo" class="w-24 h-24 rounded-full border-4 border-white/20 shadow-2xl">
    <h1 class="text-white text-xl font-black mt-6 tracking-tighter uppercase">River Valley Metro</h1>
    <div class="mt-8 w-24 h-1 bg-white/10 rounded-full overflow-hidden">
      <div class="loader-progress"></div>
    </div>
  </div>

  <div class="app-container">
    <div id="mainContent" class="opacity-0 transition-opacity duration-1000 p-6 pt-12 pb-12">
      
      <header class="text-center mb-10">
        <div class="w-12 h-1.5 bg-white/10 rounded-full mx-auto mb-8"></div>
        <h1 class="text-3xl font-black glow-text tracking-tight">River Valley Metro</h1>
        <p class="text-blue-500 font-bold text-[10px] uppercase tracking-[0.4em]">Official Transit Portal</p>
      </header>

      <div class="space-y-6">
        <div class="glass-card p-6">
          <h2 class="font-extrabold text-white mb-5 flex items-center justify-between">
            Local & Metro Plus 
            <span class="text-[9px] bg-blue-500/20 px-2 py-1 rounded text-blue-400 font-black">HOURS</span>
          </h2>
          <div class="space-y-4 text-sm">
            <div class="flex justify-between border-b border-white/5 pb-3">
                <span class="text-white/40">Mon – Fri</span><span class="font-bold text-white/90">5:00A - 9:30P</span>
            </div>
            <div class="flex justify-between border-b border-white/5 pb-3">
                <span class="text-white/40">Saturday</span><span class="font-bold text-white/90">7:00A - 9:30P</span>
            </div>
            <div class="flex justify-between text-blue-400 font-bold">
                <span>Sun / Holiday</span><span>8:00A - 4:00P</span>
            </div>
          </div>
        </div>

        <div class="glass-card p-6">
          <h2 class="font-extrabold text-white mb-5 flex items-center justify-between">
            Midway Commuter
            <span class="text-[9px] bg-indigo-500/20 px-2 py-1 rounded text-indigo-400 font-black">HOURS</span>
          </h2>
          <div class="space-y-4 text-sm">
            <div class="flex justify-between border-b border-white/5 pb-3">
                <span class="text-white/40">Mon – Fri</span><span class="font-bold text-white/90">4:45A - 9:30P</span>
            </div>
            <div class="flex justify-between border-b border-white/5 pb-3">
                <span class="text-white/40">Saturday</span><span class="font-bold text-white/90">7:00A - 9:30P</span>
            </div>
            <div class="flex justify-between text-indigo-400 font-bold">
                <span>Sun / Holiday</span><span>8:00A - 6:40P</span>
            </div>
          </div>
        </div>

        <div class="pt-4">
            <a href="tel:8159374287" class="flex items-center justify-center gap-3 bg-white text-black w-full py-5 rounded-[2rem] font-black active:scale-95 transition-all shadow-xl">
                CALL SUPPORT
            </a>
        </div>
      </div>
    </div>
  </div>

  <script id="vertexShader" type="x-shader/x-vertex">
    attribute vec2 position;
    void main() { gl_Position = vec4(position, 0.0, 1.0); }
  </script>
  <script id="fragmentShader" type="x-shader/x-fragment">
    precision highp float;
    uniform float uTime;
    uniform vec2 uResolution;
    void main() {
        vec2 uv = (gl_FragCoord.xy - 0.5 * uResolution) / min(uResolution.x, uResolution.y);
        float t = uTime * 0.1;
        vec3 col = vec3(0.0);
        for(float i = 1.0; i < 4.0; i++) {
            uv.x += 0.4 / i * sin(i * 3.0 * uv.y + t);
            uv.y += 0.4 / i * cos(i * 3.0 * uv.x + t);
            col += 0.006 / abs(sin(t + uv.y + uv.x));
        }
        gl_FragColor = vec4(col * vec3(0.1, 0.3, 0.7), 1.0);
    }
  </script>

  <script>
    // 1. WebGL Animation Setup
    const canvas = document.getElementById('canvas');
    const gl = canvas.getContext('webgl');
    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      gl.viewport(0, 0, canvas.width, canvas.height);
    }
    window.addEventListener('resize', resize);
    resize();

    const program = gl.createProgram();
    const vs = gl.createShader(gl.VERTEX_SHADER);
    gl.shaderSource(vs, document.getElementById('vertexShader').textContent);
    gl.compileShader(vs);
    const fs = gl.createShader(gl.FRAGMENT_SHADER);
    gl.shaderSource(fs, document.getElementById('fragmentShader').textContent);
    gl.compileShader(fs);
    gl.attachShader(program, vs);
    gl.attachShader(program, fs);
    gl.linkProgram(program);

    const posLoc = gl.getAttribLocation(program, 'position');
    const uTime = gl.getUniformLocation(program, 'uTime');
    const uRes = gl.getUniformLocation(program, 'uResolution');
    const buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);

    function render(t) {
      gl.useProgram(program);
      gl.uniform1f(uTime, t * 0.001);
      gl.uniform2f(uRes, canvas.width, canvas.height);
      gl.enableVertexAttribArray(posLoc);
      gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);
      gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
      requestAnimationFrame(render);
    }
    requestAnimationFrame(render);

    // 2. App Lifecycle (Splash -> Fade in)
    document.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => {
        const splash = document.getElementById('splash');
        splash.style.opacity = '0';
        splash.style.transform = 'scale(1.1)';
        
        setTimeout(() => {
          splash.style.display = 'none';
          document.getElementById('mainContent').classList.remove('opacity-0');
        }, 800);
      }, 2000);
    });
  </script>
</body>
</html>
