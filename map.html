    <style>
        :root { 
            --rvm-blue: #38bdf8; 
            --glass-bg: rgba(15, 23, 42, 0.55);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
            --success-green: #10b981;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: radial-gradient(circle at 50% 0%, #1e3a8a 0%, #0f172a 75%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 24px 24px 100px; /* Added extra bottom padding so nav doesn't overlap elements */
            margin: 0;
            color: var(--text-light);
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        #status-msg {
            background: rgba(56, 189, 248, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 24px;
            border: 1px solid rgba(56, 189, 248, 0.2);
            text-align: center;
            letter-spacing: 0.5px;
            color: #bae6fd;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        #app-container {
            width: 100%;
            max-width: 380px;
        }

        .route-card {
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 32px;
            padding: 35px 24px;
            text-align: center;
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.2s;
            cursor: pointer;
        }

        .route-card:active {
            transform: scale(0.97);
            background: rgba(15, 23, 42, 0.7);
        }

        .route-tag {
            background: rgba(56, 189, 248, 0.15);
            color: var(--rvm-blue);
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1.5px;
            padding: 6px 16px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 18px;
            border: 1px solid rgba(56, 189, 248, 0.25);
        }

        .stop-name { 
            font-weight: 700; 
            font-size: 1.5rem; 
            margin-bottom: 28px; 
            line-height: 1.3;
            letter-spacing: -0.5px;
            color: #ffffff;
        }

        .eta-circle {
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.05) 0%, rgba(0,0,0,0) 70%);
            border: 4px solid rgba(56, 189, 248, 0.4);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            box-shadow: inset 0 0 20px rgba(56, 189, 248, 0.1);
            animation: pulse-glow 2.5s infinite ease-in-out;
        }

        .eta-val { 
            font-size: 3.2rem; 
            font-weight: 800; 
            color: #ffffff;
            letter-spacing: -1px;
        }

        @keyframes pulse-glow {
            0%, 100% {
                border-color: rgba(56, 189, 248, 0.3);
                box-shadow: inset 0 0 15px rgba(56, 189, 248, 0.1), 0 0 10px rgba(56, 189, 248, 0.2);
                text-shadow: 0 0 10px rgba(56, 189, 248, 0.3);
                opacity: 0.85;
            }
            50% {
                border-color: rgba(56, 189, 248, 0.7);
                box-shadow: inset 0 0 25px rgba(56, 189, 248, 0.2), 0 0 20px rgba(56, 189, 248, 0.5);
                text-shadow: 0 0 25px rgba(56, 189, 248, 0.8);
                opacity: 1;
            }
        }

        .eta-label {
            color: var(--text-muted); 
            font-weight: 600; 
            font-size: 0.8rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .call-btn {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 24px;
            width: 100%;
            max-width: 380px;
            margin-top: 20px;
            font-weight: 700;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.25);
            transition: transform 0.2s, background 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .call-btn:active {
            transform: scale(0.97);
            background: linear-gradient(135deg, #059669 0%, #047857 100%);
        }

        /* --- Navigation Menu Styles --- */
        .android-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 72px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 12px;
            z-index: 1000;
            box-shadow: 0 -10px 30px rgba(0, 0, 0, 0.3);
        }

        .nav-link {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: var(--text-muted);
            width: 20%;
            height: 100%;
            transition: color 0.2s ease, transform 0.1s;
        }

        .nav-link svg {
            width: 24px;
            height: 24px;
            margin-bottom: 4px;
            transition: stroke 0.2s ease;
        }

        .nav-link span {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Active & Tap states */
        .nav-link.active {
            color: var(--rvm-blue);
        }

        .nav-link:active {
            transform: scale(0.92);
        }
    </style>
</head>

function calculateDistance(lat1, lon1, lat2, lon2) {
    return Math.sqrt(Math.pow(lat2 - lat1, 2) + Math.pow(lon2 - lon1, 2));
}

function updateApp() {
    if (!navigator.geolocation) {
        handleLocationError("Geolocation not supported");
        return;
    }

    navigator.geolocation.getCurrentPosition(pos => {
        const uLat = pos.coords.latitude;
        const uLon = pos.coords.longitude;

        let closest = BUS_SCHEDULE[0];
        let minD = calculateDistance(uLat, uLon, closest.lat, closest.lon);

        BUS_SCHEDULE.forEach(stop => {
            const d = calculateDistance(uLat, uLon, stop.lat, stop.lon);
            if (d < minD) {
                minD = d;
                closest = stop;
            }
        });

        displayStop(closest);
    }, (err) => {
        handleLocationError(err.message);
    });
}

function handleLocationError(error) {
    document.getElementById("status-msg").innerText = "Using default: Kankakee Metro Centre";
    const defaultStop = BUS_SCHEDULE.find(s => s.name === "Kankakee Metro Centre") || BUS_SCHEDULE[0];
    displayStop(defaultStop);
}

function displayStop(stop) {
    const now = new Date();
    const min = now.getMinutes();
    
    let next = stop.points.find(p => p >= min);
    
    if (next === undefined) {
        next = stop.points[0] + 60;
    }
    
    let wait = next - min;
    let displayWait = wait <= 0 ? "NOW" : wait + "m";

    document.getElementById("app-container").innerHTML = `
        <div class="route-card" onclick="updateApp()">
            <span class="route-tag">${stop.route}</span>
            <div class="stop-name">${stop.name}</div>
            <div class="eta-circle">
                <div class="eta-val">${displayWait}</div>
            </div>
            <div class="eta-label">Estimated Wait</div>
        </div>
    `;
    
    document.getElementById("status-msg").innerHTML = `📍 Linked to <b>${stop.name}</b>`;
}

// Start app
updateApp();
// Update every 30 seconds
setInterval(updateApp, 30000);
